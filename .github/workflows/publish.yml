name: Publish

# Auto-publish to npm when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
# Auth: npm Trusted Publishing (OIDC) — configure the trusted publisher on npmjs.
# No NPM_TOKEN secret needed (the `id-token: write` permission grants the OIDC token).

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: build + publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install
      - name: Test
        run: bun test
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Build
        run: bun run build
      # No registry-url: it writes `_authToken=${NODE_AUTH_TOKEN}` into .npmrc, and the
      # mere presence of that line disables npm's OIDC path → empty token → 404 on PUT.
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # ships npm 11.x natively (OIDC trusted publishing needs npm >= 11.5)
      - name: Upgrade npm (belt-and-suspenders for OIDC)
        run: npm install -g npm@latest --force
      - name: Publish
        # Repo public → signed provenance (sigstore) + Trusted Publishing (OIDC, no token).
        run: |
          node --version && npm --version
          npm publish --access public --provenance
