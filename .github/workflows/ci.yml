name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: bun test + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install
      - name: Test
        run: bun test
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Build
        run: bun run build
      - name: Simulator (built binary)
        run: SIM_BIN=dist/cli/bin.mjs bun test test/sim/
